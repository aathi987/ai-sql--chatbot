<!DOCTYPE html>
<html>
<head>
    <title>AI SQL Chatbot</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; }
        #chat { border: 1px solid #ccc; height: 400px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        input { width: 70%; padding: 10px; }
        button { padding: 10px 20px; }
        .user { color: blue; margin: 5px 0; }
        .bot { color: green; margin: 5px 0; }
    </style>
</head>
<body>
    <h1>AI SQL Chatbot</h1>
    <div id="chat"></div>
    <input type="text" id="userInput" placeholder="Ask me to generate SQL..." />
    <button onclick="sendMessage()">Send</button>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const message = input.value;
            
            if (!message) return;
            
            chat.innerHTML += <div class="user"><b>You:</b> ${message}</div>;
            input.value = '';
            
            const response = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: message})
            });
            
            const data = await response.json();
            chat.innerHTML += <div class="bot"><b>Bot:</b> <pre>${data.response}</pre></div>;
            chat.scrollTop = chat.scrollHeight;
        }
        
        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
