<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI SQL Chatbot</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fc;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:800px;
height:650px;
background:white;
border-radius:10px;
box-shadow:0px 0px 15px rgba(0,0,0,0.2);
display:flex;
flex-direction:column;
overflow:hidden;
}

.header{
background:#007bff;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

#chat{
flex:1;
padding:20px;
overflow-y:auto;
background:#fafafa;
}

.message{
margin-bottom:15px;
}

.user{
text-align:right;
}

.user span{
display:inline-block;
background:#007bff;
color:white;
padding:10px 15px;
border-radius:10px;
max-width:70%;
word-wrap:break-word;
}

.bot{
text-align:left;
}

.bot span{
display:inline-block;
background:#e9ecef;
color:black;
padding:10px 15px;
border-radius:10px;
max-width:70%;
word-wrap:break-word;
}

.input-area{
display:flex;
padding:15px;
background:white;
border-top:1px solid #ddd;
}

#userInput{
flex:1;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:5px;
outline:none;
}

button{
margin-left:10px;
padding:12px 25px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#0056b3;
}

pre{
white-space:pre-wrap;
font-family:Consolas;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
AI SQL Chatbot
</div>

<div id="chat"></div>

<div class="input-area">

<input
type="text"
id="userInput"
placeholder="Ask SQL questions... Example: Show all employees">

<button id="sendBtn">
Send
</button>

</div>

</div>

<script>

const chat=document.getElementById("chat");
const input=document.getElementById("userInput");
const button=document.getElementById("sendBtn");

button.addEventListener("click",sendMessage);

input.addEventListener("keydown",function(e){

if(e.key==="Enter"){

sendMessage();

}

});

async function sendMessage(){

const message=input.value.trim();

if(message===""){

alert("Please enter a message");

return;

}

chat.innerHTML+=`
<div class="message user">
<span>${message}</span>
</div>
`;

chat.scrollTop=chat.scrollHeight;

input.value="";

try{

const response=await fetch("/chat",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

message:message

})

});

if(!response.ok){

throw new Error("Server Error");

}

const data=await response.json();

chat.innerHTML+=`
<div class="message bot">
<span><pre>${data.response}</pre></span>
</div>
`;

}catch(error){

chat.innerHTML+=`
<div class="message bot">
<span style="color:red;">
Unable to connect to server.<br>
${error.message}
</span>
</div>
`;

}

chat.scrollTop=chat.scrollHeight;

}

</script>

</body>
</html>
