<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SQL Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        #chat { border: 1px solid #ccc; height: 400px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
       .user { color: blue; margin: 5px 0; }
       .bot { color: green; margin: 5px 0; }
        input { width: 70%; padding: 10px; }
        button { padding: 10px 20px; }
    </style>
</head>
<body>
    <h1>AI SQL Chatbot</h1>
    <div id="chat"></div>
    <input type="text" id="userInput" placeholder="Ask me to write SQL..." />
    <button onclick="sendMessage()">Send</button>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const question = input.value;
            
            if (!question) return;
            
            // Show user message
            chat.innerHTML += <div class="user"><b>You:</b> ${question}</div>;
            input.value = '';
            
            // Call backend - THIS LINE IS THE IMPORTANT CHANGE
            const response = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: question })
            });
            
            const data = await response.json();
            
            // Show bot message
            chat.innerHTML += <div class="bot"><b>Bot:</b> <pre>${data.answer}</pre></div>;
            chat.scrollTop = chat.scrollHeight;
        }
        
        // Send on Enter key
        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
