<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SQL Chatbot</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            max-width: 900px; 
            margin: 40px auto; 
            padding: 20px; 
            background: #f0f2f5;
        }
        h1 { text-align: center; color: #333; }
        #chat { 
            border: 1px solid #ddd; 
            height: 450px; 
            overflow-y: auto; 
            padding: 15px; 
            margin-bottom: 15px; 
            background: white;
            border-radius: 8px;
        }
        .input-area { display: flex; gap: 10px; }
        input { 
            flex: 1; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 5px;
            font-size: 16px;
        }
        button { 
            padding: 12px 25px; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background: #0056b3; }
        .user { color: #007bff; margin: 8px 0; }
        .bot { color: #28a745; margin: 8px 0; }
        pre { 
            background: #f4f4f4; 
            padding: 10px; 
            border-radius: 4px; 
            overflow-x: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>AI SQL Chatbot</h1>
    <div id="chat"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask me to generate SQL... e.g. show me all users" />
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const message = input.value.trim();
            
            if (!message) return;
            
            chat.innerHTML += <div class="user"><b>You:</b> ${message}</div>;
            input.value = '';
            
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: message})
                });
                
                const data = await response.json();
                chat.innerHTML += <div class="bot"><b>Bot:</b> <pre>${data.response}</pre></div>;
            } catch (error) {
                chat.innerHTML += <div class="bot"><b>Error:</b> Could not connect to server</div>;
            }
            chat.scrollTop = chat.scrollHeight;
        }
